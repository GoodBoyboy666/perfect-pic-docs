<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cameraBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3578e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2554a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGlass" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" style="stop-color:#1c3d72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Camera Body Shape -->
  <path d="M150 90 L180 50 H332 L362 90 H440 C462.09 90 480 107.91 480 130 V420 C480 442.09 462.09 460 440 460 H72 C49.91 460 32 442.09 32 420 V130 C32 107.91 49.91 90 72 90 H150 Z" fill="url(#cameraBody)" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Lens Housing Ring -->
  <circle cx="256" cy="275" r="135" fill="#e8e8e8" />
  <circle cx="256" cy="275" r="120" fill="#3578e5" />
  
  <!-- Inner Lens -->
  <circle cx="256" cy="275" r="100" fill="url(#lensGlass)" />
  
  <!-- Aperture Blades (Stylized) -->
  <g transform="translate(256, 275)">
    <path d="M0 -100 A100 100 0 0 1 86.6 50 L 0 0 Z" fill="#ffffff" opacity="0.1"/>
    <path d="M86.6 50 A100 100 0 0 1 -86.6 50 L 0 0 Z" fill="#ffffff" opacity="0.15"/>
    <path d="M-86.6 50 A100 100 0 0 1 0 -100 L 0 0 Z" fill="#ffffff" opacity="0.05"/>
  </g>
  
  <!-- Lens Reflection/Glint -->
  <ellipse cx="220" cy="240" rx="30" ry="15" transform="rotate(-45 220 240)" fill="#ffffff" opacity="0.4" />
  <circle cx="280" cy="310" r="8" fill="#ffffff" opacity="0.3" />

  <!-- Shutter Button -->
  <rect x="380" y="60" width="60" height="30" rx="5" fill="#2554a0" />
  <rect x="390" y="50" width="40" height="10" rx="2" fill="#e8e8e8" />

  <!-- Flash/Sensor -->
  <circle cx="100" cy="150" r="15" fill="#ffffff" opacity="0.8" />
</svg>